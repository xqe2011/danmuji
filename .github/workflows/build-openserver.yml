name: Build Open Server Docker Image
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t open-server:${{  github.ref_name }} ./open-server
          docker tag open-server:${{  github.ref_name }} ghcr.io/${{ github.repository }}/open-server:${{  github.ref_name }}
          docker push ghcr.io/${{ github.repository }}/open-server:${{  github.ref_name }}
